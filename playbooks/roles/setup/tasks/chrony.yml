# chrony(時刻同期)設定
---
- name: Install chrony
  become: true
  ansible.builtin.dnf:
    state: present
    name: chrony

- name: Enable chronyd
  become: true
  ansible.builtin.systemd:
    name: chronyd.service
    enabled: true

- name: Set ntp server for chrory
  become: true
  ansible.builtin.replace:
    path: /etc/chrony.conf
    regexp: '^#?pool .*$'
    replace: 'pool {{ ntp_server }} iburst'
  when: ntp_server is defined
  notify: 'restart chronyd'
