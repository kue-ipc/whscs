# pkg util
---
- name: Install editors
  become: true
  ansible.builtin.dnf:
    state: present
    name:
      - vim-enhanced
      - emacs-nox
      - nano
      - pinentry

- name: Install terminals
  become: true
  ansible.builtin.dnf:
    state: present
    name:
      - tmux

- name: Install shell
  become: true
  ansible.builtin.dnf:
    state: present
    name:
      - bash
      - tcsh
      - zsh

- name: Install others
  become: true
  ansible.builtin.dnf:
    state: present
    name:
      - git
      - rsync
      - curl
      - wget

- name: Install others for el9
  become: true
  ansible.builtin.dnf:
    state: present
    name:
      - lynx
  when: ansible_facts.distribution_version is version("9", ">=")
