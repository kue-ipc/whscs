---
- name: Reload systed
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  listen: 'reload systemd'

- name: Restart chronyd
  become: true
  ansible.builtin.systemd:
    name: chronyd.service
    state: restarted
  listen: 'restart chronyd'

- name: Restart sshd
  become: true
  ansible.builtin.systemd:
    name: sshd.service
    state: restarted
  listen: 'restart sshd'

- name: Reload firewalld
  become: true
  ansible.builtin.command: firewall-cmd --reload
  changed_when: true
  listen: 'reload firewalld'
