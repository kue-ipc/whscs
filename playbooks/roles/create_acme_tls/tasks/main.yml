# create acme
---
- name: Task webuser in user role
  ansible.builtin.include_role:
    name: user
    tasks_from: webuser
  when:
    - site is not defined
    - user is defined

- name: Set site
  ansible.builtin.set_fact:
    site: '{{ user_webuser.site }}'
  when:
    - site is not defined
    - user is defined

- name: Check site
  ansible.builtin.assert:
    that: site is defined
    msg: 'Require `site` or `user` variable'
    quiet: true

- name: Task info in acme role
  ansible.builtin.import_role:
    name: acme
    tasks_from: info
  vars:
    acme_domain: '{{ site }}'

- name: Delete previous files when force
  delegate_to: localhost
  run_once: true
  ansible.builtin.file:
    path: '{{ item }}'
    state: absent
  loop:
    - '{{ acme_info.challenge }}'
    - '{{ acme_tls_info.key }}'
    - '{{ acme_tls_info.csr }}'
    - '{{ acme_tls_info.cert }}'
    - '{{ acme_tls_info.chained_cert }}'
  when: force

- name: Set acme_challenge_info to empty when force
  ansible.builtin.set_fact:
    acme_challenge_info: {}
  when:
    - force
    - acme_challenge_info is defined

- name: Task key in tls role
  ansible.builtin.import_role:
    name: tls
    tasks_from: key
  vars:
    tls_info: '{{ acme_tls_info }}'

- name: Task csr in tls role
  ansible.builtin.import_role:
    name: tls
    tasks_from: csr
  vars:
    tls_info: '{{ acme_tls_info }}'

- name: Task cert in acme role for challenge
  ansible.builtin.import_role:
    name: acme
    tasks_from: cert
  vars:
    acme_domain: '{{ site }}'

- name: Sync html dir
  become: true
  ansible.builtin.copy:
    src: '{{ data_acme_challenge_dir }}/'
    dest: '{{ web_root_dir }}{{ web_well_known_acme_challeng_path }}/'
    directory_mode: '0755'
    mode: '0644'
    owner: root
    group: root
  when: ("rp" in group_names)

- name: Task cert in acme role for get cert
  ansible.builtin.import_role:
    name: acme
    tasks_from: cert
  vars:
    acme_domain: '{{ site }}'

- name: Check key and tls files
  ansible.builtin.assert:
    that:
      - acme_tls_info.key is file
      - acme_tls_info.cert is file
      - acme_tls_info.chained_cert is file
    msg: 'ACME TLS files are not created properly'
    quiet: true

- name: Veriyf tls
  ansible.builtin.import_role:
    name: tls
    tasks_from: verify
  vars:
    tls_info: '{{ acme_tls_info }}'

- name: Set tls_info by info task in tls role
  ansible.builtin.import_role:
    name: tls
    tasks_from: info
  vars:
    tls_domain: '{{ site }}'

- name: Copy file without cert
  delegate_to: localhost
  run_once: true
  ansible.builtin.copy:
    remote_src: true
    src: '{{ acme_tls_info[item] }}'
    dest: '{{ tls_info[item] }}'
    mode: '{{ (item == "key") | ternary("0600", "0644") }}'
    backup: true
  loop:
    - key
    - csr
    - chained_cert
  register: create_acme_tls_copy_files_result

- name: Task move_file in data role for backup files without cert
  ansible.builtin.include_role:
    name: data
    tasks_from: move_file
  vars:
    data_move_file_dir: '{{ data_backup_tls_dir }}'
  loop: >-
    {{ create_acme_tls_copy_files_result.results
      | selectattr("changed") | selectattr("backup_file", "defined")
      | map(attribute="backup_file") | list }}
  loop_control:
    loop_var: data_move_file_path

- name: Copy cert file
  delegate_to: localhost
  run_once: true
  ansible.builtin.copy:
    remote_src: true
    src: '{{ acme_tls_info.cert }}'
    dest: '{{ tls_info.cert }}'
    mode: '0644'
    backup: true
  register: create_acme_tls_copy_cert_file_result

- name: Task move_file in data role for backup cert file
  ansible.builtin.include_role:
    name: data
    tasks_from: move_file
  vars:
    data_move_file_path: '{{ create_acme_tls_copy_cert_file_result.backup_file }}'
    data_move_file_dir: '{{ data_acme_superseded_dir }}'
  when:
    - create_acme_tls_copy_cert_file_result.changed
    - create_acme_tls_copy_cert_file_result.backup_file is defined
