# health check
---
- name: Task lvm pool
  ansible.builtin.include_tasks: lvm_pool.yml
  when: '"fs" in group_names'
  tags: fs

- name: Task gluster
  ansible.builtin.include_tasks: gluster.yml
  when: inventory_hostname == gluster_main_server
  tags: fs

- name: Task mount
  ansible.builtin.include_tasks: mount.yml
  when: group_names | intersect(["mgt", "bk", "app", "web", "test"]) | length > 0
  tags: fs

- name: Task disk
  ansible.builtin.import_tasks: disk.yml
  tags: fs

- name: Task service
  ansible.builtin.import_tasks: service.yml
  tags: service

- name: Task system
  ansible.builtin.import_tasks: system.yml
  tags: system

- name: Task tls
  ansible.builtin.include_tasks:
    file: tls.yml
    apply:
      tags: tls
  when: group_names | intersect(["web", "test", "rp"]) | length > 0
  tags: tls

- name: Task tls_httpd
  ansible.builtin.include_tasks:
    file: tls_httpd.yml
    apply:
      tags: tls
  when: group_names | intersect(["app", "test"]) | length > 0
  tags: tls
