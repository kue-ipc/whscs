# phpMyAdmin
---
- name: Install epel-release
  become: true
  ansible.builtin.dnf:
    state: present
    name: epel-release

- name: Install phpmyadmin
  become: true
  ansible.builtin.dnf:
    state: present
    name: phpmyadmin
  notify: 'restart nginx'

- name: Replace host
  become: true
  ansible.builtin.replace:
    path: /etc/phpMyAdmin/config.inc.php
    regexp: ^(?:\s*//)?\s*\$cfg\['Servers'\]\[\$i\]\['host'\]\s*=[^;]*;
    replace: "$cfg['Servers'][$i]['host'] = 'db';"
