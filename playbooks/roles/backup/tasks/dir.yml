# create backup dirs
---
- name: Role sv lvm
  ansible.builtin.import_role:
    name: sv_lvm

- name: Create a bakup data volume
  become: true
  community.general.lvol:
    vg: '{{ lvm_vg }}'
    lv: '{{ backup_data_name }}'
    size: +100%FREE

- name: Create a xfs filesystem on bakup data
  become: true
  community.general.filesystem:
    dev: '/dev/{{ lvm_vg }}/{{ backup_data_name }}'
    fstype: xfs
    resizefs: true

- name: Mount backup data
  become: true
  ansible.posix.mount:
    path: '{{ backup_data_dir }}'
    src: '/dev/{{ lvm_vg }}/{{ backup_data_name }}'
    fstype: xfs
    state: mounted

- name: Make backup dirs for user
  become: true
  ansible.builtin.file:
    path: '{{ backup_data_dir }}/{{ item }}'
    state: directory
    owner: '{{ ansible_user_id }}'
    group: wheel
    mode: '0750'
  loop:
    - data
    - db
    - pg
    - web
