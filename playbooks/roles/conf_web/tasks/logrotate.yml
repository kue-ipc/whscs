# logrotate
---
- name: Set seboolean for logrotate
  become: true
  ansible.posix.seboolean:
    name: '{{ item }}'
    state: true
    persistent: true
  loop:
    - logrotate_use_fusefs
    - logrotate_use_nfs

- name: Template nginx_user to logrotate.d
  become: true
  ansible.builtin.template:
    src: logrotate.d/nginx_user.j2
    dest: '/etc/logrotate.d/nginx_user'
    owner: root
    group: root
    mode: '0644'
